<style>
  :root{--ink:#49111A;--muted:#9a8f88;--line:#e7ddd3;--uva:#6D1233;--rosa:#F56770;--bg:#F9F3EF}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;color:var(--ink);background:var(--bg);height:100vh;overflow:hidden}
  .top{height:56px;background:var(--uva);color:#fff;display:flex;align-items:center;gap:11px;padding:0 16px}
  .brandlogo{display:flex;align-items:center;gap:9px}
  .brandlogo svg,.brandlogo .blogo{width:32px;height:36px;display:block;object-fit:contain}
  .brandlogo .wm{font-family:'Nunito',sans-serif;font-weight:900;font-size:19px;color:#fff;letter-spacing:-.3px}
  .brandlogo .adm{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--rosa);background:rgba(255,255,255,.14);padding:3px 8px;border-radius:6px}
  .logo{background:var(--rosa);color:#fff;font-weight:700;padding:5px 14px;border-radius:8px;font-size:17px}
  .logo small{font-size:9px;opacity:.85;letter-spacing:2px}
  .top .sp{margin-left:auto}
  .btn-g{background:var(--rosa);color:#fff;border:none;padding:9px 22px;border-radius:22px;font-size:13px;cursor:pointer;font-weight:800;font-family:'Nunito'}
  .btn-c{background:rgba(255,255,255,.16);color:#fff;border:none;padding:9px 20px;border-radius:22px;font-size:13px;cursor:pointer;font-family:'Nunito';font-weight:700}
  .layout{display:flex;height:calc(100vh - 52px)}
  .editor{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .tabs{display:flex;flex-wrap:wrap;gap:3px;padding:8px 12px 0;background:linear-gradient(90deg,#6D1233,#8f1a42)}
  .tab{padding:8px 12px;font-size:11.5px;cursor:pointer;color:#f4dae1;background:rgba(255,255,255,.16);border-radius:6px 6px 0 0;letter-spacing:.5px}
  .tab.on{background:#faf5f1;color:var(--ink);font-weight:600}
  .tab.nuevo{background:#F56770;color:#ffffff}
  .panel{flex:1;overflow-y:auto;background:#faf5f1;padding:22px 26px}
  .col{max-width:640px}
  .grp{margin-bottom:16px}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:5px}
  input[type=text],input[type=datetime-local],select,textarea{width:100%;border:1px solid var(--line);border-radius:5px;padding:9px 11px;font-family:'Nunito';font-size:13px;color:var(--ink);background:#ffffff}
  input[readonly]{background:#efe7de;color:#8a7f76}
  textarea{resize:vertical;min-height:60px}
  input[type=color]{width:52px;height:36px;border:1px solid var(--line);border-radius:5px;background:#fff;padding:2px;vertical-align:middle}
  input[type=range]{width:100%}
  .file{border:1px dashed rgba(109,18,51,.3);border-radius:8px;padding:12px;text-align:center;color:var(--uva);font-size:12px;background:#f6ece6;cursor:pointer}
  .chk{display:flex;align-items:center;gap:9px}.chk input{width:18px;height:18px}
  .mejoras{background:#fbeef0;border:1px solid rgba(245,103,112,.35);border-radius:10px;padding:16px;margin-bottom:22px}
  .mejoras .h{font-size:12px;font-weight:600;color:var(--uva);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .temas{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .tema{border:2px solid transparent;border-radius:9px;overflow:hidden;cursor:pointer;background:#fff}
  .tema.on{border-color:var(--uva)}.tema .sw{height:24px}.tema .nm{padding:4px;font-size:11px;text-align:center;font-weight:500}
  /* invitados */
  .stat{display:flex;gap:10px;margin-bottom:14px}.stat .b{flex:1;background:#f6ece6;border-radius:10px;padding:12px;text-align:center}
  .stat .n{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--uva)}.stat .l{font-size:10px;text-transform:uppercase;color:var(--muted)}
  .addrow{display:flex;gap:8px;align-items:end;flex-wrap:wrap}.addrow .f{flex:1;min-width:80px}
  .addbtn{background:var(--uva);color:#fff;border:none;border-radius:22px;padding:9px 18px;font-size:12.5px;cursor:pointer;font-family:'Nunito'}
  .lnk{font-size:12.5px;color:var(--uva);cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;font-family:'Nunito'}
  .guest{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13px}
  .guest .lk{font-size:11px;color:var(--muted)}.guest .x{color:#F56770;cursor:pointer;margin-left:auto}
  .hint{font-size:11.5px;color:var(--muted);margin-top:5px;font-style:italic}
  .guia{background:#fbf3f6;border:1px solid #e6cdd7;border-left:4px solid var(--uva);border-radius:11px;padding:13px 15px;margin:0 0 15px;font-size:12.5px;line-height:1.55;color:#5a4450}
  .guia .gt{font-weight:900;color:var(--uva);font-size:13.5px;margin-bottom:5px}
  .guia ol{margin:7px 0 0;padding-left:19px}
  .guia li{margin:4px 0}
  .guia b{color:var(--uva)}
  .aviso{background:#fff6e9;border:1px solid #f0d9b0;border-left:4px solid #c98a2e;border-radius:9px;padding:8px 11px;margin-top:6px;font-size:11.5px;line-height:1.5;color:#7a5a24}
  .adgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .adopt{background:#fff;border:1.5px solid #e7ddd3;border-radius:10px;height:44px;cursor:pointer;color:#7a6a5c;display:flex;align-items:center;justify-content:center;padding:5px 6px}

  .adopt .adnone{color:#b0a89f;font-size:13px}

    --verde:#2e433c;--verde2:#26372f;--cream:#eee6d6;--sage:#7f9079;--sage-cl:#a9b8a0;--muted2:#7d857a;--fD:'Forum',serif;--fS:'Rouge Script',cursive}
  .screen::-webkit-scrollbar{width:0}
  .p-portada{position:relative;min-height:100%;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;text-align:center;padding:0 20px 34px;color:#fbf7ef;background:linear-gradient(rgba(25,28,22,.12) 26%,rgba(20,24,18,.66)),var(--v-cover) var(--v-pos,50% 45%)/auto var(--v-size,100%);background-repeat:no-repeat}
  .p-kick{font-family:var(--fD);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#e7ddc8}
  .p-names{line-height:1.02;margin:7px 0 14px;color:#fbf7ef;text-shadow:0 2px 16px rgba(0,0,0,.45)}
  .p-fecha{font-family:var(--fD);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#efe7d6}
  .p-count{display:flex;justify-content:center;gap:3px;margin-top:11px}.p-count .b{min-width:34px;text-align:center}
  .p-count .num{font-family:var(--fD);font-size:21px;color:#fbf7ef}.p-count .l{font-family:'Lora',serif;font-style:italic;font-size:8px;color:#e7ddc8}.p-count .s{font-family:var(--fD);font-size:16px;color:#cdbf9f}
  .p-pase{background:var(--verde);color:var(--cream);padding:24px 20px;text-align:center}.p-pase .t{font-family:var(--fS);font-size:27px;color:#f0e7d4}
  .p-card{display:flex;gap:10px;align-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:10px;margin-top:11px;text-align:left}

  .p-sec{padding:26px 20px;text-align:center}.p-sec.v{background:var(--verde);color:var(--cream)}

  /* ==== Contraseña del panel ==== */

  #gate .gwm{font-family:'Nunito';font-weight:900;color:var(--uva);font-size:24px;margin-bottom:2px}
  #gate p{font-size:13px;color:var(--muted);margin-bottom:16px}
  #gate input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:15px;margin-bottom:10px;font-family:'Nunito'}
  #gate button{width:100%;padding:12px;border:0;border-radius:22px;background:var(--rosa);color:#fff;font-weight:800;font-family:'Nunito';font-size:15px;cursor:pointer}
  #gate #gm{color:var(--rosa);font-size:12.5px;margin-top:10px;min-height:16px}
  .tqcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
  .tqhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px;color:var(--uva)}
  .tqopts{margin-top:8px}

  .tqopt input[type=radio]{width:18px;height:18px;accent-color:var(--rosa)}
  .tqx{cursor:pointer;color:var(--rosa);font-size:12px}
  .mcard{border:1px solid #e7ddd3;border-radius:10px;padding:10px;background:#faf5f1;min-height:64px}
  .mcard.over{border-color:#F56770;background:#fbeef0}
  .mcardh{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px;color:#6D1233}
  .mchip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e7ddd3;border-radius:8px;padding:6px 8px;margin-bottom:5px;font-size:12px;cursor:grab}
  .mchip:active{cursor:grabbing}
  .ordrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid #e7ddd3;border-radius:8px;margin-bottom:6px;background:#faf5f1;font-size:13px}
  .ordb{border:0;background:#efe7de;color:#49111A;border-radius:6px;cursor:pointer;padding:3px 8px;font-size:12px}
  .gthumbs{display:flex;flex-wrap:wrap;gap:8px}
  .gthumb{position:relative;width:82px;height:82px;border-radius:8px;overflow:hidden;border:1px solid #e7ddd3}
  .gthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .gx{position:absolute;top:2px;right:2px;background:rgba(20,16,24,.6);color:#fff;border-radius:50%;width:19px;height:19px;text-align:center;cursor:pointer;font-size:11px;line-height:19px}

<body>
<div id="gate">
  <div class="gbox">
    <div class="gwm">inv&iacute;tame!</div>
    <p>Ingres&aacute; con el usuario del equipo</p>
    <input id="gmail" type="email" placeholder="Correo" autocomplete="username" autofocus>
    <input id="gp" type="password" placeholder="Contrase&ntilde;a" autocomplete="current-password" onkeydown="if(event.key==='Enter')chkpass()">
    <button onclick="chkpass()">Entrar</button>
    <div id="gm"></div>
  </div>
</div>
<script>
  // Login real con Firebase Auth (usuario del equipo)
  function chkpass(){
    var e=(document.getElementById('gmail').value||'').trim(), p=document.getElementById('gp').value, m=document.getElementById('gm');
    if(!e||!p){ m.textContent='Complet\u00e1 el correo y la contrase\u00f1a'; return; }
    m.textContent='Entrando\u2026';
    (function tryLogin(){
      if(!window.INV||!window.INV.auth){ setTimeout(tryLogin,300); return; }
      window.INV.login(e,p).then(function(){ m.textContent=''; })
        .catch(function(){ m.textContent='Correo o contrase\u00f1a incorrectos'; document.getElementById('gp').value=''; });
    })();
  }
  (function watch(){
    if(!window.INV||!window.INV.auth){ setTimeout(watch,300); return; }
    window.INV.onAuth(function(u){ var g=document.getElementById('gate'); if(g) g.style.display = u ? 'none' : 'flex'; });
  })();
  window.salir=function(){ if(window.INV&&window.INV.logout) window.INV.logout(); };
</script>

  let cur="PRINCIPAL";
  function buildTabs(){el('tabs').innerHTML=ORDER.map(t=>'<div class="tab '+(t===cur?'on':'')+(t==='INVITADOS'||t==='EFECTOS'?' nuevo':'')+'" onclick="go(\''+t+'\')">'+(t==='INVITADOS'?'INVITADOS ✦':t==='EFECTOS'?'✨ EFECTOS':t)+'</div>').join('');}
  // Cada pestaña edita principalmente una sección de la invitación.
  // Al cambiar de pestaña, scrolleamos el preview a esa sección para que
  // la diseñadora VEA lo que está tocando (antes el preview se quedaba en la portada).
  const TAB2SEC={PRINCIPAL:'',LUGAR_VEST:'eventos',GALERIA_INSTA_VID:'galeria',PERSONAS:'padres',REGALOS:'regalos','CONFIRMACIÓN':'confirmacion',MUSIC_PASES:'spotify',AVANZADO:'',TRIVIA:'trivia',EFECTOS:'',INVITADOS:''};
  function scrollPreviewTo(sec){
    const fr=el('pv-frame'); if(!fr||!fr.contentDocument)return;
    try{
      const doc=fr.contentDocument, scr=fr.parentElement;
      // Agrandamos el iframe a la altura de su contenido para que el "celular"
      // (.screen, overflow-y:auto) pueda scrollearlo. La invitación ya neutralizó
      // el 100vh en modo preview, así que la altura es estable.
      const h=Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
      fr.style.height=h+'px';
      setTimeout(function(){
        try{
          if(!sec){ scr.scrollTop=0; return; }
          const target=[].slice.call(doc.querySelectorAll('[data-sec="'+sec+'"]'))
                        .find(function(e){return e.querySelector('h2,h3');}) || doc.querySelector('[data-sec="'+sec+'"]');
          if(target){
            const rt=target.getBoundingClientRect(), rs=scr.getBoundingClientRect();
            scr.scrollTop = scr.scrollTop + (rt.top - rs.top) - 6;
          }
        }catch(e){}
      },140);
    }catch(e){}
  }
  function go(t){cur=t;buildTabs();renderPanel(); setTimeout(function(){ scrollPreviewTo(TAB2SEC[t]); },250);}
  function renderPanel(){
    if(cur==='INVITADOS'){el('panel').innerHTML=invitadosHtml();renderGuests();return;}
    if(cur==='EFECTOS'){el('panel').innerHTML=efectosHtml();return;}
    let h=(cur==='PRINCIPAL'?mejorasHtml():cur==='TRIVIA'?triviaHtml():cur==='GALERIA_INSTA_VID'?galeriaHtml():cur==='PERSONAS'?personasHtml():'');
    h+=FIELDS[cur].map(fieldHtml).join('');
    el('panel').innerHTML=h;
    if(cur==='PRINCIPAL'){buildTemas();el('mf-nfont').value=D.nfont;sincronizarVersionPreview();render();}
    if(cur==='PERSONAS'){renderPersonas();}
  }

  // ==== Editor de foto: arrastrar para mover + zoom (tipo Instagram) ====
  let edOn=false,edX=0,edY=0;
  function edPt(e){const t=e.touches&&e.touches[0];return t?{x:t.clientX,y:t.clientY}:{x:e.clientX,y:e.clientY};}
  function edStart(e){e.preventDefault();edOn=true;const p=edPt(e);edX=p.x;edY=p.y;
    document.addEventListener('mousemove',edMove);document.addEventListener('mouseup',edEnd);
    document.addEventListener('touchmove',edMove,{passive:false});document.addEventListener('touchend',edEnd);}
  function edMove(e){if(!edOn)return;e.preventDefault();const p=edPt(e),w=el('imgedit').offsetWidth||220,h=el('imgedit').offsetHeight||130;
    D.cx=Math.max(0,Math.min(100,D.cx-(p.x-edX)/w*80));
    D.cy=Math.max(0,Math.min(100,D.cy-(p.y-edY)/h*80));
    edX=p.x;edY=p.y;render();}
  function edEnd(){edOn=false;document.removeEventListener('mousemove',edMove);document.removeEventListener('mouseup',edEnd);
    document.removeEventListener('touchmove',edMove);document.removeEventListener('touchend',edEnd);}

  async function subirImg(input,key,id){

    const box=input.previousElementSibling; const prev=box?box.textContent:'';
    if(box)box.textContent='Subiendo… ⏳';
    try{const url=await INV.uploadImage(f); D[key]=url;

      const p=el('prev-'+id); if(p)p.innerHTML='<img src="'+url+'" style="max-height:60px;border-radius:8px;margin-top:6px">';
    }catch(e){console.error(e); if(box)box.textContent=prev||'⬆ Subir imagen'; alert('No se pudo subir: '+(e.message||e));}
    input.value='';
  }
  function cargarFontCustom(val,target){
    val=(val||'').trim(); if(!val)return;
    let fam=val; const m=val.match(/family=([^:&]+)/i); if(m)fam=decodeURIComponent(m[1].replace(/\+/g,' '));
    fam=fam.replace(/["']/g,'').trim(); if(!fam)return;
    const gid2='gf-'+fam.replace(/[^a-z0-9]/gi,'');
    if(!document.getElementById(gid2)){const lk=document.createElement('link');lk.id=gid2;lk.rel='stylesheet';lk.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(fam).replace(/%20/g,'+')+':wght@400;600;700&display=swap';document.head.appendChild(lk);}
    setB(target, "'"+fam+"',cursive");
  }

    const yo=miMail();
    const soyOwner=OWNER.map(x=>x.toLowerCase()).includes(yo);

    if(!soyOwner && !puedePedir){

      const snap=await getDocs(collection(window.INV.db,'inv_eventos'));
      const ahora=Date.now(), venc=[];
      snap.forEach(d=>{ const ev=d.data(); if(ev.sinVencimiento||!ev.fecha)return; const f=new Date(ev.fecha); if(isNaN(f))return; const dias=(typeof ev.diasVigencia==='number'&&ev.diasVigencia>0)?ev.diasVigencia:90; if(ahora>(f.getTime()+dias*86400000)) venc.push({id:d.id, nombre:((ev.n1||'')+(ev.n2?' & '+ev.n2:''))||d.id, fecha:(ev.fecha||'').slice(0,10)}); });

      const lista=venc.slice(0,25).map(v=>'• '+v.nombre+'  ('+v.fecha+')').join('\n');

      if(!soyOwner){

        await addDoc(collection(window.INV.db,'inv_pedidos'),{
          tipo:'vencidas', estado:'pendiente',

          detalle:venc.length+' vencida(s)'

        return;

      let bEv=0,bG=0;
      for(const v of venc){
        try{ const gs=await getDocs(query(collection(window.INV.db,'inv_invitados'), where('slug','==',v.id))); for(const g of gs.docs){ await deleteDoc(doc(window.INV.db,'inv_invitados',g.id)); bG++; } }catch(_e){}

    }catch(e){ alert('No se pudo limpiar: '+(e.message||e)); }

    const base=(D.slug||'').trim();
    if(!base){alert("Primero poné la 'Dirección del evento' de esta invitación.");return;}
    const nuevo=prompt('📋 Duplicar esta invitación.\n\nEscribí la dirección (link) de la NUEVA pareja\n(minúsculas, sin espacios, ej: sofia-y-mateo):', base+'-copia');
    if(!nuevo)return;
    const ns=nuevo.toLowerCase().replace(/[^a-z0-9-]+/g,'-');
    try{
      const existe=await INV.getEvento(ns);
      if(existe && !confirm('Ya existe una invitación en "'+ns+'". ¿La querés sobrescribir?')) return;
      const {invitados, ...cfg}=D;
      let nEvento; try{ const _all=await INV.exportAll(); const _mx=_all.eventos.reduce((m,e)=>Math.max(m,parseInt(e.nEvento,10)||0),0); nEvento=_mx+1; }catch(_e){ nEvento=(parseInt(D.nEvento,10)||1)+1; }
      await INV.saveEvento(ns,{...cfg, slug:ns, nEvento, tpl:(D.tpl||'')+' (copia)'});
      alert('✓ ¡Listo! Se creó la copia en "'+ns+'".\n\nAhora la vas a abrir para cambiarle los nombres, la fecha y las fotos. Los invitados NO se copian (cada pareja tiene los suyos).');
      location.href='admin.html?e='+encodeURIComponent(ns);
    }catch(e){alert('No se pudo duplicar: '+(e.message||e));}
  }
  async function clonarInv(slug){
    const nuevo=prompt('Dirección de la copia (minúsculas, sin espacios):', slug+'-copia'); if(!nuevo)return;
    const ns=nuevo.toLowerCase().replace(/[^a-z0-9-]+/g,'-');
    try{const ev=await INV.getEvento(slug); if(!ev){alert('No encontré el evento');return;}
      await INV.saveEvento(ns,{...ev,slug:ns,tpl:(ev.tpl||'')+' (copia)'});
      alert('✓ Clonada como '+ns); verInvitaciones();
    }catch(e){alert('No se pudo clonar: '+(e.message||e));}
  }
  async function backup(){
    if(!window.INV||!INV.exportAll){alert('Todav\u00eda no carg\u00f3 la base. Esper\u00e1 2 seg.');return;}
    try{
      const data=await INV.exportAll();
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);
      a.download='backup-invitame-'+new Date().toISOString().slice(0,10)+'.json';a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),3000);
    }catch(e){console.error(e);alert('No se pudo exportar: '+(e.message||e));}
  }
  // ==== SOLICITUDES (autoservicio: lo que cargan los clientes) ====
  function _esc(s){return String(s==null?'':s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));}
  async function actualizarBadgeSolic(){ try{ if(!window.solicListar)return; const l=await window.solicListar(); const b=el('solic-badge'); if(b){ if(l.length){b.textContent=l.length;b.style.display='';}else{b.style.display='none';} } }catch(e){} }
  window.actualizarBadgeSolic=actualizarBadgeSolic;
  async function verSolicitudes(){
    if(!window.solicListar){alert('Todavía no cargó la base. Esperá 2 segundos.');return;}
    let box=el('solicbox'); if(!box){box=document.createElement('div');box.id='solicbox';box.style.cssText='position:fixed;inset:0;background:rgba(73,17,26,.55);display:flex;align-items:flex-start;justify-content:center;z-index:9999;padding:26px 18px;overflow:auto';document.body.appendChild(box);}
    box.innerHTML='<div class="invmodal" style="background:#fff;max-width:760px;width:100%;border-radius:14px;padding:20px;font-family:Nunito,sans-serif"><div style="color:#9a8f88">Cargando…</div></div>';
    try{
      const list=await window.solicListar(); window._solicCache=list;
      const rows=list.map((s,i)=>{
        const fecha=s.fecha?new Date(s.fecha):null; const fstr=(fecha&&!isNaN(fecha))?fecha.toLocaleDateString('es'):'—';
        const obs=s.observaciones?('<div style="background:#fff6e9;border-left:3px solid #c98a2e;border-radius:8px;padding:7px 10px;margin-top:7px;font-size:12.5px">📝 <b>Pedido especial:</b> '+_esc(s.observaciones)+'</div>'):'';
        const extra=[s.dress?('👗 '+s.dress):'',s.regalos?('🎁 '+s.regalos):''].filter(Boolean).join(' · ');
        return '<div style="border:1px solid #eee2d8;border-radius:12px;padding:12px;margin-bottom:10px">'+
          '<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">'+
            '<div style="min-width:0"><b style="color:#6D1233;font-size:16px">'+_esc((s.n1||'')+(s.n2?' & '+s.n2:''))+'</b>'+
              '<div style="font-size:12px;color:#9a8f88">'+(s.tipoEvento?'<b style="color:#6D1233">'+_esc(s.tipoEvento)+'</b> · ':'')+_esc(s.tplNombre||s.tpl||'')+' · '+fstr+' · '+((s.invitados||[]).length)+' invitados</div>'+
              '<div style="font-size:12px;color:#7d756c;margin-top:2px">📱 '+_esc(s.contactoNombre||'—')+' · '+_esc(s.contactoWsp||'')+(s.contactoEmail?' · ✉ '+_esc(s.contactoEmail):'')+'</div>'+
              (extra?'<div style="font-size:12px;color:#7d756c;margin-top:2px">'+_esc(extra)+'</div>':'')+ obs +'</div>'+
            '<div style="white-space:nowrap;display:flex;flex-direction:column;gap:6px">'+
              '<button class="addbtn" onclick="cargarSolicitudIdx('+i+')">Cargar en el editor</button>'+
              '<button class="lnk" onclick="marcarResuelta(\''+s.id+'\')">Marcar resuelta</button>'+
            '</div>'+
          '</div></div>';
      }).join('')||'<div style="color:#9a8f88;padding:14px;text-align:center">No hay solicitudes pendientes. 🎉</div>';
      box.querySelector('.invmodal').innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0;color:#6D1233;font-weight:900">📥 Solicitudes de clientes <span style="color:#b0a89f;font-weight:700;font-size:13px">('+list.length+')</span></h3><button style="background:#efe7de;border:0;border-radius:20px;padding:8px 16px;font-family:Nunito;font-weight:700;cursor:pointer" onclick="document.getElementById(\'solicbox\').remove()">Cerrar</button></div>'+rows;
    }catch(e){console.error(e);box.querySelector('.invmodal').innerHTML='<p style="color:#F56770">Error: '+(e.message||e)+'</p>';}
  }
  function cargarSolicitudIdx(i){ const s=(window._solicCache||[])[i]; if(!s)return;
    if(s.tpl&&TEMAS[s.tpl])setTema(s.tpl);
    D.n1=s.n1||D.n1; D.n2=s.n2||''; if(s.fecha)D.fecha=s.fecha; D.frase=s.frase||''; if(s.kick)D.kick=s.kick; if(s.cover)D.cover=s.cover; if(s.coverVideo)D.coverVideo=s.coverVideo; if(s.galeria&&s.galeria.length)D.galeria=s.galeria;
    if(s.tipoEvento)D.tipoEvento=s.tipoEvento; if(s.musica)D.musica=s.musica; if(s.musicaUrl)D.musicaUrl=s.musicaUrl;
    if(s.fraseFx)D.fraseFx=s.fraseFx; if(s.igHashtag)D.igHashtag=s.igHashtag; if(s.spotifyUrl)D.spotifyUrl=s.spotifyUrl;
    ['reg_liverpool','reg_amazon','reg_sears','reg_mercadolibre','reg_palacio','reg_venmo','reg_paypal','reg_otro_n','reg_otro_u','regClabe','regTitular','regBanco'].forEach(k=>{ if(s[k])D[k]=s[k]; });
    D.ev1t=s.ev1t||''; D.ev1dir=s.ev1d||''; D.ev1fecha=s.ev1f||''; D.ev1maps=s.ev1maps||''; D.ev2t=s.ev2t||''; D.ev2dir=s.ev2d||''; D.ev2fecha=s.ev2f||''; D.ev2maps=s.ev2maps||'';
    D.slug=slug((s.n1||'pareja')+(s.n2?'-y-'+s.n2:''));
    D.invitados=(s.invitados||[]).map(g=>({n:g.n,p:g.p||'1',m:g.m||'-',t:Math.random().toString(36).slice(2,8)}));
    D._solicId=s.id;
    const bx=el('solicbox'); if(bx)bx.remove();
    go('PRINCIPAL'); render(); if(typeof renderPanel==='function')renderPanel();
    let extra=''; if(s.observaciones)extra+='\n\n📝 PEDIDO ESPECIAL:\n'+s.observaciones; if(s.dress)extra+='\n\n👗 Dress code: '+s.dress; if(s.regalos)extra+='\n\n🎁 Regalos: '+s.regalos;
    alert('✓ Cargué los datos de '+(s.n1||'')+(s.n2?' & '+s.n2:'')+'.\n\nRevisá, ajustá lo que haga falta y tocá "Guardar y publicar".'+extra+'\n\nCuando termines, volvé a 📥 Solicitudes y tocá "Marcar resuelta".');
  }
  async function marcarResuelta(id){ if(!confirm('¿Marcar esta solicitud como resuelta? Sale de la lista de pendientes.'))return; try{ await window.solicResolver(id); actualizarBadgeSolic(); verSolicitudes(); }catch(e){alert('No se pudo: '+(e.message||e));} }
  buildTabs();renderPanel();render();setInterval(updCount,1000);
  if(window.INV) cargarEvento(); else window.addEventListener('inv-ready',cargarEvento);
  {var _tb=new URLSearchParams(location.search).get('tab'); if(_tb&&ORDER.indexOf(_tb)>-1){go(_tb);}}
</script>
<script type="module" src="firebase-inv.js?v=20"></script>
<script type="module">
  import { collection, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  function _ready(){ return (window.INV&&window.INV.ok)?Promise.resolve():new Promise(r=>window.addEventListener('inv-ready',r,{once:true})); }
  window.solicListar=async function(){ await _ready(); const snap=await getDocs(query(collection(window.INV.db,'inv_solicitudes'), where('estado','==','pendiente'))); const arr=snap.docs.map(d=>({id:d.id,...d.data()})); arr.sort((a,b)=>((b.creado&&b.creado.seconds)||0)-((a.creado&&a.creado.seconds)||0)); return arr; };
  window.solicResolver=async function(id){ await _ready(); await updateDoc(doc(window.INV.db,'inv_solicitudes',id),{estado:'procesada'}); };
  _ready().then(()=>{ if(window.actualizarBadgeSolic) window.actualizarBadgeSolic(); });
</script>
